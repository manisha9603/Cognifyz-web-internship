<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery & Slideshow</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
  font-family: 'Segoe UI', sans-serif;
  background-color: #f0f4f8;  /* ← was #0f172a */
  color: #2c3e50;              /* ← was white */
  padding: 50px 60px;
}

    h2 {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .divider {
      border: none;
      border-top: 2px solid #e2e8f0;
      margin: 60px 0;
    }

    /* ── GALLERY ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
    }

    .gallery-item .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(56, 189, 248, 0.15);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    /* ── MODAL ── */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal.open { display: flex; }

    .modal img {
      max-width: 75%;
      max-height: 80vh;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(56,189,248,0.3);
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 40px;
      font-size: 48px;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    /* ── SLIDESHOW ── */
    .slideshow-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }

    .slideshow-container {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(56,189,248,0.2);
    }

    .slide { display: none; }
    .slide.active { display: block; }

    .slide img {
      width: 100%;
      height: 420px;
      object-fit: cover;
    }

    .slide-label {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
      padding: 30px 25px 20px;
      font-size: 20px;
      font-weight: 600;
    }

    /* Dots */
    .dots {
      text-align: center;
      margin-top: 20px;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #cbd5e1;
      border-radius: 50%;
      margin: 0 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .dot.active { background-color: #38bdf8; }
  </style>
</head>
<body>

  <!-- GALLERY -->
  <h2>💻 Tech & Coding Gallery</h2>
  <p class="subtitle">Click any image to enlarge</p>

  <div class="gallery-grid">

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=400&h=300&fit=crop" alt="Coding">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400&h=300&fit=crop" alt="Laptop">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=400&h=300&fit=crop" alt="Developer">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=300&fit=crop" alt="Code Screen">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400&h=300&fit=crop" alt="Code Editor">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=400&h=300&fit=crop" alt="Tech">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=400&h=300&fit=crop" alt="Programming">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&h=300&fit=crop" alt="Circuit">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1550439062-609e1531270e?w=400&h=300&fit=crop" alt="Server">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400&h=300&fit=crop" alt="Matrix">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?w=400&h=300&fit=crop" alt="Colorful Code">
      <div class="overlay">🔍</div>
    </div>

    <div class="gallery-item" onclick="openModal(this)">
      <img src="https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=400&h=300&fit=crop" alt="Workspace">
      <div class="overlay">🔍</div>
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal" id="modal" onclick="closeModal()">
    <span class="modal-close">✕</span>
    <img id="modalImg" src="" alt="Enlarged">
  </div>

  <hr class="divider">

  <!-- SLIDESHOW -->
  <h2>🎞️ Auto Slideshow</h2>
  <p class="subtitle">Auto transitions every 3 seconds</p>

  <div class="slideshow-wrapper">
    <div class="slideshow-container">

      <div class="slide active">
        <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=900&h=420&fit=crop">
        <div class="slide-label">💻 The Art of Coding</div>
      </div>

      <div class="slide">
        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=900&h=420&fit=crop">
        <div class="slide-label">🖥️ Clean Code, Clean Mind</div>
      </div>

      <div class="slide">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=900&h=420&fit=crop">
        <div class="slide-label">⚡ Powering the Future</div>
      </div>

      <div class="slide">
        <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=900&h=420&fit=crop">
        <div class="slide-label">🔐 Data & Intelligence</div>
      </div>

      <div class="slide">
        <img src="https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?w=900&h=420&fit=crop">
        <div class="slide-label">🌈 Creative Development</div>
      </div>

    </div>

    <div class="dots">
      <span class="dot active" onclick="goToSlide(0)"></span>
      <span class="dot" onclick="goToSlide(1)"></span>
      <span class="dot" onclick="goToSlide(2)"></span>
      <span class="dot" onclick="goToSlide(3)"></span>
      <span class="dot" onclick="goToSlide(4)"></span>
    </div>
  </div>

  <script>
    // GALLERY MODAL
    function openModal(item) {
      const src = item.querySelector('img').src;
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    // SLIDESHOW
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');

    function goToSlide(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = n;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    setInterval(() => {
      goToSlide((current + 1) % slides.length);
    }, 3000);
  </script>

</body>
</html>
