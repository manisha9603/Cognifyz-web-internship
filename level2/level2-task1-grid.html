<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid Layout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    html, body {
      width: 100%;
      background-color: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      zoom: 1;
    }

    .main-section {
      padding: 60px 50px;
    }

    h2 {
      color: #2c3e50;
      font-weight: 800;
      font-size: 56px;
      text-align: center;
      margin-bottom: 60px;
    }

    .card-box {
      background-color: #ffffff;
      border-radius:16px;
      padding:40px 30px ;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card-box:hover {
      transform: translateY(-8px);
    }

    .card-box h5 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .card-box p {
      color: #666;
      font-size: 20px;
      line-height: 1.7;
    }

    .icon {
      font-size: 100px;
      margin-bottom: 30px;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="main-section">
    <h2>Our Internship Domains</h2>

    <div class="row g-4">

      <div class="col-md-4">
        <div class="card-box">
          <div class="icon">🌐</div>
          <h5>Web Development</h5>
          <p>Build responsive and modern websites using the latest technologies.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card-box">
          <div class="icon">📊</div>
          <h5>Data Science</h5>
          <p>Analyze data and build intelligent models using Python and ML.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card-box">
          <div class="icon">🤖</div>
          <h5>Artificial Intelligence</h5>
          <p>Explore AI concepts and build smart applications for real-world use.</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
