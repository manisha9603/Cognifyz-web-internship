<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulma Card Component</title>

  <!-- Bulma CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>

  <!-- Your card goes here -->

  <section class="section">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-one-third">

        <div class="card">
          <div class="card-image">
            <figure class="image is-4by3">
              <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=640&h=480&fit=crop" alt="Card Image">
            </figure>
          </div>
          <div class="card-content">
            <p class="title is-4">Web Development</p>
            <p class="subtitle is-6">Cognifyz Technologies</p>
            <div class="content">
              Learn how to build modern, responsive websites using 
              the latest tools and frameworks in the industry.
            </div>
          </div>
          <footer class="card-footer">
            <a href="#" class="card-footer-item">Learn More</a>
            <a href="#" class="card-footer-item">Apply Now</a>
          </footer>
        </div>

      </div>
    </div>
  </div>
</section>

</body>
</html>
